<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for You</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff5f7;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* ورود حقيقية كتحرك */
        .flower {
            position: absolute;
            font-size: 25px;
            animation: drift linear infinite;
            opacity: 0.7;
            z-index: 0;
        }

        @keyframes drift {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        /* حاوية الكود */
        #auth-container {
            text-align: center;
            z-index: 10;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        input {
            padding: 12px;
            border: 2px solid #ff4d6d;
            border-radius: 8px;
            outline: none;
            text-align: center;
            font-size: 18px;
            width: 150px;
        }

        /* الرسالة والظرف */
        .envelope-wrapper {
            display: none;
            position: relative;
            cursor: pointer;
            z-index: 5;
        }

        .envelope {
            width: 280px;
            height: 180px;
            background: #ff4d6d;
            position: relative;
            border-radius: 0 0 10px 10px;
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: -90px;
            left: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-bottom: 90px solid #ff758f;
            transition: transform 0.6s;
            transform-origin: bottom;
        }

        .envelope.open::before {
            transform: rotateX(180deg);
        }

        .letter {
            position: absolute;
            bottom: 10px;
            left: 15px;
            width: 250px;
            height: 150px;
            background: white;
            padding: 15px;
            text-align: center;
            transition: transform 0.6s;
            z-index: -1;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .envelope.open .letter {
            transform: translateY(-120px);
            z-index: 2;
            height: auto;
            min-height: 200px;
        }

        .final-message {
            display: none;
            color: #333;
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="auth-container">
    <h3 style="color: #ff4d6d;">أدخل الكود السري</h3>
    <input type="password" id="pin" placeholder="****" oninput="verify()">
</div>

<div class="envelope-wrapper" id="wrap" onclick="openMe()">
    <div class="envelope" id="env">
        <div class="letter">
            <div class="final-message" id="text">
                <h2 style="color: #ff4d6d; margin-top: 0;">إلى أغلى إنسانة 🌸</h2>
                <p>هاد الميساج صاوبتو ليك باش نقول ليك شحال أنتِ عزيزة عندي.</p>
                <p>كنتمنى هاد الورد يعجبك، وكيفما هاد الورد كيفتح، حتى حياتك تكون ديما منورة.</p>
                <p style="font-weight: bold;">أنتِ هي الـ Unique Vibe ديالي ✨</p>
            </div>
        </div>
    </div>
</div>

<script>
    function createFlowers() {
        const types = ['🌹', '🌸', '🌷', '🌺', '🌼'];
        for(let i=0; i<25; i++) {
            let f = document.createElement('div');
            f.className = 'flower';
            f.innerText = types[Math.floor(Math.random()*types.length)];
            f.style.left = Math.random()*100 + 'vw';
            f.style.animationDuration = (Math.random()*3 + 3) + 's';
            f.style.fontSize = (Math.random()*20 + 20) + 'px';
            document.body.appendChild(f);
        }
    }

    function verify() {
        if(document.getElementById('pin').value === '2008') { // الكود الخاص بك
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('wrap').style.display = 'block';
            createFlowers();
        }
    }

    function openMe() {
        document.getElementById('env').classList.add('open');
        setTimeout(() => {
            document.getElementById('text').style.display = 'block';
        }, 400);
    }
</script>

</body>
</html>
